<!DOCTYPE html>
<html>
<head>
    <title>DIVYANSHI BANK</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        }

        /* Navbar */
        .navbar {
            background: #0a192f;
            color: white;
            padding: 15px 40px;
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* Main Container */
        .main {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 90vh;
        }

        /* Card */
        .card {
            background: white;
            padding: 30px;
            width: 420px;
            border-radius: 15px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.4);
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(20px);}
            to {opacity: 1; transform: translateY(0);}
        }

        h2 {
            text-align: center;
            color: #2c5364;
        }

        /* Inputs */
        .input-group {
            margin: 10px 0;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
            transition: 0.3s;
        }

        input:focus, select:focus {
            border-color: #2c5364;
            box-shadow: 0 0 5px #2c5364;
        }

        /* Button */
        button {
            width: 100%;
            padding: 12px;
            background: #2c5364;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            margin-top: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #1b3c4a;
            transform: scale(1.03);
        }

        /* Result */
        .result {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            text-align: center;
        }

        .approved {
            background: #d4edda;
            color: #155724;
        }

        .rejected {
            background: #f8d7da;
            color: #721c24;
        }

        /* Footer */
        .footer {
            text-align: center;
            color: white;
            margin-top: 10px;
            font-size: 13px;
        }
    </style>
</head>

<body>

<div class="navbar">
    🏦 KANCHAN BANK
</div>

<div class="main">

    <div class="card">
        <h2>Loan Approval System</h2>

        <form action="/predict" method="post">

            <div class="input-group">
                <input type="number" name="Age" placeholder="Age" required>
            </div>

            <div class="input-group">
                <input type="number" name="Income" placeholder="Income" required>
            </div>

            <div class="input-group">
                <input type="number" name="Loan_Amount" placeholder="Loan Amount" required>
            </div>

            <div class="input-group">
                <input type="number" name="Credit_Score" placeholder="Credit Score" required>
            </div>

            <div class="input-group">
                <input type="number" name="Employment_Years" placeholder="Employment Years" required>
            </div>

            <div class="input-group">
                <select name="Education_Level" required>
                    <option value="">Select Education</option>
                    <option value="High School">High School</option>
                    <option value="Bachelors">Bachelors</option>
                    <option value="Masters">Masters</option>
                    <option value="PhD">PhD</option>
                </select>
            </div>

            <div class="input-group">
                <select name="Housing_Status" required>
                    <option value="">Select Housing</option>
                    <option value="Rent">Rent</option>
                    <option value="Own">Own</option>
                    <option value="Mortgage">Mortgage</option>
                </select>
            </div>

            <button type="submit">Check Eligibility</button>

        </form>

        {% if prediction_text %}
            <div class="result 
                {% if 'Approved' in prediction_text %}
                    approved
                {% else %}
                    rejected
                {% endif %}
            ">
                {{ prediction_text }}
            </div>
        {% endif %}

    </div>

</div>

<div class="footer">
    © 2026 DIVYANSHI BANK | Smart Loan AI System
</div>

</body>
</html>
